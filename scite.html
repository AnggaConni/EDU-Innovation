<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edu-Scite — Smart Citation Assistant</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcfcfc; }
        .font-serif-title { font-family: 'Merriweather', serif; }
        
        /* Markdown Styles for Academic Look */
        .academic-body { font-size: 0.95rem; color: #334155; line-height: 1.8; }
        .academic-body p { margin-bottom: 1.25rem; }
        .academic-body strong { font-weight: 700; color: #0f172a; }
        .academic-body ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1.25rem; }
        .academic-body li { margin-bottom: 0.5rem; }
        .academic-body h3 { font-family: 'Merriweather', serif; font-size: 1.25rem; font-weight: 700; color: #1e293b; margin-top: 2rem; margin-bottom: 1rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.5rem;}
        
        /* --- SCITE.AI STYLE CITATION BADGES --- */
        .scite-badge {
            display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 12px;
            font-size: 0.7rem; font-weight: 700; cursor: pointer; transition: all 0.2s ease;
            vertical-align: middle; border: 1px solid transparent; margin: 0 2px;
            font-family: 'Inter', sans-serif; text-decoration: none !important;
        }
        .scite-supporting { background-color: #ecfdf5; color: #059669; border-color: #a7f3d0; }
        .scite-mentioning { background-color: #f1f5f9; color: #475569; border-color: #cbd5e1; }
        .scite-contrasting { background-color: #eff6ff; color: #2563eb; border-color: #bfdbfe; }

        /* Purple - External/Web Publications */
        .scite-external { background-color: #f3e8ff; color: #7e22ce; border-color: #e9d5ff; }
        .scite-external:hover { background-color: #e9d5ff; transform: translateY(-1px); box-shadow: 0 2px 4px rgba(126, 34, 206, 0.1); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="h-full flex overflow-hidden text-slate-800">

    <!-- Sidebar Settings (Kiri) -->
    <aside class="w-72 bg-white border-r border-slate-200 flex flex-col shadow-[2px_0_10px_rgba(0,0,0,0.02)] z-10 hidden md:flex shrink-0">
        <div class="p-6 border-b border-slate-100 flex items-center gap-3 cursor-pointer" onclick="window.location.href='index.html'">
            <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center text-white shadow-sm">
                <i class="ph-bold ph-quotes"></i>
            </div>
            <div>
                <h1 class="text-lg font-serif-title font-bold text-slate-900 leading-none">Edu-Scite</h1>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">Smart Citations</p>
            </div>
        </div>

        <div class="p-6 flex-1 overflow-y-auto space-y-6">
            <!-- Database Status -->
            <div class="p-4 bg-slate-50 rounded-xl border border-slate-100 shadow-inner">
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2" data-i18n="dbLabel">Corpus Source</label>
                <div class="flex items-start gap-2">
                    <div id="db-indicator" class="w-2 h-2 rounded-full bg-amber-400 animate-pulse mt-1.5 shrink-0"></div>
                    <div>
                        <span id="db-status" class="text-sm font-bold text-slate-700 leading-tight" data-i18n="dbLoading">Syncing repositories...</span>
                        <p id="db-count" class="text-xs text-slate-500 mt-1"></p>
                    </div>
                </div>
            </div>

            <!-- API Key Input -->
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2" data-i18n="apiLabel">Authentication (BYOK)</label>
                <div class="relative">
                    <i class="ph-bold ph-key absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="password" id="api-key" placeholder="Enter Gemini API Key..." class="w-full pl-9 pr-3 py-2 bg-white border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500 transition-all shadow-sm">
                </div>
            </div>

            <!-- Model Selection -->
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2" data-i18n="modelLabel">Inference Model</label>
                <select id="model-select" class="w-full p-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-700 shadow-sm focus:outline-none focus:border-indigo-500">
                    <option value="gemini-2.5-flash">Gemini 2.5 Flash (Fast)</option>
                    <option value="gemini-2.5-pro">Gemini 2.5 Pro (Deep)</option>
                </select>
            </div>

            <!-- Language Toggle -->
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2" data-i18n="langLabel">Output Language</label>
                <div class="flex bg-slate-100 p-1 rounded-lg border border-slate-200 shadow-inner">
                    <button onclick="setLang('en')" id="btn-en" class="flex-1 py-1.5 text-xs font-bold rounded-md bg-white shadow-sm text-indigo-600 transition-all border border-slate-200">English</button>
                    <button onclick="setLang('id')" id="btn-id" class="flex-1 py-1.5 text-xs font-bold rounded-md text-slate-500 hover:text-slate-700 transition-all bg-transparent border border-transparent">Bahasa</button>
                </div>
            </div>
        </div>
        
        <div class="p-4 bg-white border-t border-slate-100">
            <button onclick="clearChat()" class="w-full py-2.5 px-4 bg-white border border-slate-200 text-slate-600 rounded-lg text-xs font-bold uppercase tracking-wider hover:bg-rose-50 hover:text-rose-600 hover:border-rose-200 transition-all flex items-center justify-center gap-2">
                <i class="ph-bold ph-trash"></i> <span data-i18n="clearChat">Clear Research</span>
            </button>
        </div>
    </aside>

    <!-- Main Chat Area (Tengah) -->
    <main class="flex-1 flex flex-col h-full bg-[#fcfcfc] relative">
        <header class="flex items-center justify-between p-4 border-b border-slate-200 bg-white shadow-sm">
            <div class="flex items-center gap-2 md:hidden text-indigo-600">
                <i class="ph-bold ph-quotes text-xl"></i>
                <h1 class="text-base font-serif-title font-bold text-slate-900">Edu-Scite</h1>
            </div>
            
            <!-- Tombol Toggle Evidence Panel (Kolom Kanan) -->
            <div class="ml-auto">
                <button onclick="toggleEvidencePanel()" class="flex items-center gap-2 px-3 py-1.5 bg-indigo-50 text-indigo-600 border border-indigo-100 rounded-lg text-xs font-bold hover:bg-indigo-100 transition-all">
                    <i class="ph-bold ph-books"></i> <span id="evidence-toggle-text">Evidence: OFF</span>
                </button>
            </div>
        </header>

        <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-10 scroll-smooth">
            <div class="max-w-4xl mx-auto flex flex-col gap-10" id="chat-history">
                <!-- Initial Welcome -->
                <div class="flex flex-col items-center justify-center text-center py-10 opacity-80" id="welcome-block">
                    <div class="w-16 h-16 bg-indigo-50 text-indigo-500 rounded-2xl flex items-center justify-center text-3xl mb-4 border border-indigo-100">
                        <i class="ph-fill ph-magnifying-glass"></i>
                    </div>
                    <h2 class="font-serif-title text-2xl font-bold text-slate-800 mb-2">Ask an evidence-based question</h2>
                    <p class="text-sm text-slate-500 max-w-md mx-auto mb-6" id="welcome-msg">I analyze your dataset and provide answers backed by <span class="font-bold text-emerald-600">Supporting</span>, <span class="font-bold text-blue-600">Contrasting</span>, or <span class="font-bold text-slate-600">Mentioning</span> citations.</p>
                </div>
            </div>
            <div id="chat-anchor" class="h-10"></div>
        </div>

        <!-- Input Area -->
        <div class="p-4 md:p-8 bg-gradient-to-t from-[#fcfcfc] to-transparent">
            <div class="max-w-4xl mx-auto relative bg-white border-2 border-slate-200 rounded-2xl p-2 focus-within:border-indigo-500 shadow-lg flex items-end gap-2">
                <div class="p-3 text-slate-400 shrink-0 mb-1"><i class="ph-bold ph-sparkle text-xl"></i></div>
                <textarea id="chat-input" rows="1" placeholder="Ask a research question..." class="w-full max-h-40 bg-transparent border-none focus:ring-0 resize-none text-base p-3 py-3.5 text-slate-800 placeholder-slate-400 font-medium" oninput="this.style.height = ''; this.style.height = Math.min(this.scrollHeight, 160) + 'px'"></textarea>
                <button id="send-btn" onclick="sendMessage()" class="shrink-0 w-12 h-12 mb-1 mr-1 rounded-xl bg-indigo-600 text-white flex items-center justify-center hover:bg-indigo-700 transition-all shadow-md disabled:opacity-50">
                    <i class="ph-bold ph-arrow-up text-xl"></i>
                </button>
            </div>
        </div>
    </main>

    <!-- Evidence Panel (Kanan - Mode Preview Data AI) -->
    <aside id="evidence-panel" class="w-80 bg-slate-50 border-l border-slate-200 flex-col shadow-inner z-10 hidden shrink-0">
        <div class="p-4 border-b border-slate-200 bg-white flex items-center justify-between">
            <div class="flex items-center gap-2 text-slate-800">
                <i class="ph-bold ph-files text-lg text-indigo-600"></i>
                <h2 class="text-sm font-bold font-serif-title">Retrieved Evidence</h2>
            </div>
            <button onclick="toggleEvidencePanel()" class="text-slate-400 hover:text-slate-600"><i class="ph-bold ph-x"></i></button>
        </div>
        
        <div class="p-4 flex-1 overflow-y-auto space-y-4 h-full">
            <!-- Internal Data -->
            <div id="internal-evidence-list" class="space-y-4">
                <div class="text-center py-10 opacity-60">
                    <i class="ph-duotone ph-file-search text-4xl text-slate-400 mb-2"></i>
                    <p class="text-xs font-medium text-slate-500">Ask a question to see data.</p>
                </div>
            </div>
            
            <!-- External Web Data (Akan Muncul Jika Ada Hasil Web) -->
            <div id="external-evidence-section" class="hidden mt-6 pt-4 border-t-2 border-dashed border-slate-200 space-y-4 pb-10">
                <h3 class="text-xs font-bold text-purple-600 uppercase tracking-wider flex items-center gap-2">
                    <i class="ph-bold ph-globe"></i> Web & Publications
                </h3>
                <div id="external-evidence-list" class="space-y-4"></div>
            </div>
        </div>


    </aside>

    <!-- Scripts -->
    <script>
        // --- State Management ---
        let currentLang = 'en';
        let innovationData = [];
        let chatHistory = [];
        let evidencePanelOpen = false;

        // --- Dictionary ---
        const i18n = {
            en: {
                dbLabel: "Corpus Source", dbLoading: "Syncing repositories...", dbSuccess: "Database Synchronized",
                dbFail: "Connection Failed", apiLabel: "Authentication (BYOK)", modelLabel: "Inference Model",
                langLabel: "Output Language", clearChat: "Clear Research", errorNoKey: "⚠️ Please enter Gemini API Key.",
                errorDb: "⚠️ Corpus empty.", errorApi: "⚠️ Inference API Error.",
                loading: "Searching literature & synthesizing..."
            },
            id: {
                dbLabel: "Sumber Korpus", dbLoading: "Sinkronisasi...", dbSuccess: "Database Tersinkronisasi",
                dbFail: "Koneksi Gagal", apiLabel: "Autentikasi (BYOK)", modelLabel: "Model Inferensi",
                langLabel: "Bahasa Output", clearChat: "Hapus Riset", errorNoKey: "⚠️ Masukkan API Key Gemini.",
                errorDb: "⚠️ Korpus kosong.", errorApi: "⚠️ API Error.",
                loading: "Mencari data & menyintesis..."
            }
        };

        window.onload = () => {
            const savedKey = localStorage.getItem('gii_gemini_key');
            if (savedKey) document.getElementById('api-key').value = savedKey;
            loadDataset();
            document.getElementById('chat-input').addEventListener('keypress', function (e) {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
            });
        };

        function setLang(lang) {
            currentLang = lang;
            document.getElementById('btn-en').className = lang === 'en' ? "flex-1 py-1.5 text-xs font-bold rounded-md bg-white shadow-sm text-indigo-600 border border-slate-200 transition-all" : "flex-1 py-1.5 text-xs font-bold rounded-md text-slate-500 hover:text-slate-700 bg-transparent transition-all border border-transparent";
            document.getElementById('btn-id').className = lang === 'id' ? "flex-1 py-1.5 text-xs font-bold rounded-md bg-white shadow-sm text-indigo-600 border border-slate-200 transition-all" : "flex-1 py-1.5 text-xs font-bold rounded-md text-slate-500 hover:text-slate-700 bg-transparent transition-all border border-transparent";
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) el.innerHTML = i18n[lang][key];
            });
        }

        // --- Data Loading ---
        async function loadDataset() {
            const dbStatus = document.getElementById('db-status');
            const dbIndicator = document.getElementById('db-indicator');
            const dbCount = document.getElementById('db-count');

            const urls = [
                'https://raw.githubusercontent.com/AnggaConni/GSI-Radar/refs/heads/main/data.json',
                'https://raw.githubusercontent.com/AnggaConni/EDU-Innovation/refs/heads/main/data.json',
                'https://raw.githubusercontent.com/AnggaConni/ICH-Radar/refs/heads/main/data.json',
                'https://raw.githubusercontent.com/AnggaConni/Nexus-Radar/refs/heads/main/data.json',
                'https://raw.githubusercontent.com/AnggaConni/artifact-radar/refs/heads/main/data.json'
            ];

            try {
                const results = await Promise.all(urls.map(async u => {
                    try { 
                        const res = await fetch(u + '?v=' + new Date().getTime()); 
                        const data = await res.json(); 
                        return Array.isArray(data) ? data : (data.inventory || []); 
                    } catch(e) { return []; }
                }));
                
                innovationData = results.flat();

                if (innovationData.length > 0) {
                    dbIndicator.className = "w-2 h-2 rounded-full bg-emerald-500 mt-1.5 shrink-0";
                    dbStatus.innerText = i18n[currentLang].dbSuccess;
                    dbCount.innerText = `${innovationData.length} documents indexed`;
                } else throw new Error("Empty DB");
            } catch (error) {
                dbIndicator.className = "w-2 h-2 rounded-full bg-rose-500 mt-1.5 shrink-0";
                dbStatus.innerText = i18n[currentLang].dbFail;
                dbCount.innerText = "Check network";
            }
        }

        // --- Panel Toggle ---
        function toggleEvidencePanel() {
            evidencePanelOpen = !evidencePanelOpen;
            const panel = document.getElementById('evidence-panel');
            const toggleText = document.getElementById('evidence-toggle-text');
            
            if (evidencePanelOpen) {
                panel.classList.remove('hidden');
                panel.classList.add('flex');
                toggleText.innerText = "Evidence: ON";
            } else {
                panel.classList.add('hidden');
                panel.classList.remove('flex');
                toggleText.innerText = "Evidence: OFF";
            }
        }

        // --- SEARCH ENGINE (Mencari Data Relevan Sebelum Kirim ke AI) ---
        function retrieveRelevantData(query) {
            // Hapus kata hubung dasar agar pencarian fokus pada kata kunci
            const stopWords = ['yang', 'di', 'ke', 'dari', 'apa', 'bagaimana', 'untuk', 'dan', 'atau', 'is', 'the', 'in', 'of', 'and', 'to', 'how', 'what'];
            const keywords = query.toLowerCase().split(/\W+/).filter(w => w.length > 2 && !stopWords.includes(w));
            
            let scoredData = innovationData.map(item => {
                let score = 0;
                let categoryText = Array.isArray(item.category) ? item.category.join(' ') : (item.category || '');
                let textToSearch = `${item.title || ''} ${item.summary || ''} ${categoryText} ${item.location?.country || ''}`.toLowerCase();
                
                keywords.forEach(kw => {
                    if (textToSearch.includes(kw)) score += 1;
                });
                return { item, score };
            });

            // Urutkan berdasarkan skor tertinggi
            scoredData.sort((a, b) => b.score - a.score);
            
            // Ambil Top 15 data yang paling nyambung
            const topResults = scoredData.filter(d => d.score > 0).slice(0, 15).map(d => d.item);
            
            // Jika tidak ada kata yang cocok, kirimkan secara acak (fallback)
            if (topResults.length === 0 && innovationData.length > 0) {
                return innovationData.slice(0, 10);
            }
            return topResults;
        }

        function updateEvidencePanel(retrievedData) {
            const list = document.getElementById('internal-evidence-list');
            document.getElementById('external-evidence-section').classList.add('hidden'); // Reset tab eksternal
            list.innerHTML = '';
            
            if(retrievedData.length === 0) {
                list.innerHTML = `<p class="text-xs text-slate-400 text-center mt-10">No specific internal data found.</p>`;
                return;
            }

            retrievedData.forEach((data, index) => {
                list.innerHTML += `
                    <div class="bg-white p-3 rounded-lg border border-slate-200 shadow-sm">
                        <div class="text-[10px] font-bold text-indigo-500 uppercase tracking-wider mb-1">Local #${index + 1}</div>
                        <h3 class="text-[13px] font-bold text-slate-800 leading-tight mb-1">${data.title || 'Untitled'}</h3>
                        <p class="text-[11px] text-slate-500 line-clamp-3">${data.summary || 'No description available.'}</p>
                    </div>
                `;
            });
            
            if(!evidencePanelOpen) toggleEvidencePanel();
        }

        // --- Parsing Chat & Scite ---
        function parseSciteCitations(text) {
            // Kita tambahkan kata 'External' agar ikut diparsing menjadi badge
            return text.replace(/\[\[(Supporting|Contrasting|Mentioning|External):\s*(.+?)\]\]/gi, (match, type, title) => {
                let lowerType = type.toLowerCase();
                let icon = lowerType === 'supporting' ? '<i class="ph-bold ph-check-circle"></i>' : 
                        lowerType === 'contrasting' ? '<i class="ph-bold ph-x-circle"></i>' : 
                        lowerType === 'external' ? '<i class="ph-bold ph-globe"></i>' : '<i class="ph-bold ph-quotes"></i>';
                return `<span class="scite-badge scite-${lowerType}" title="${title} (${type})">${icon} ${title}</span>`;
            });
        }

        function appendMessage(role, text) {
            const container = document.getElementById('chat-history');
            const welcome = document.getElementById('welcome-block');
            if (welcome) welcome.remove();

            const msgDiv = document.createElement('div');
            if (role === 'user') {
                msgDiv.className = "flex gap-4 md:gap-6 w-full items-start pb-6 border-b border-slate-100";
                msgDiv.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center shrink-0 border border-slate-300">
                        <i class="ph-fill ph-user text-slate-500 text-sm"></i>
                    </div>
                    <div class="flex-1 pt-1">
                        <h3 class="font-bold text-slate-800 text-sm mb-2">Research Question</h3>
                        <p class="text-lg md:text-xl font-serif-title font-bold text-slate-900 leading-snug">${text.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</p>
                    </div>
                `;
            } else {
                msgDiv.className = "flex gap-4 md:gap-6 w-full items-start py-6";
                let htmlContent = marked.parse(text);
                htmlContent = parseSciteCitations(htmlContent);

                msgDiv.innerHTML = `
                    <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center shrink-0 shadow-md">
                        <i class="ph-bold ph-quotes text-white text-sm"></i>
                    </div>
                    <div class="flex-1 pt-1 overflow-hidden">
                        <div class="academic-body w-full">${htmlContent}</div>
                    </div>
                `;
            }
            container.appendChild(msgDiv);
            document.getElementById('chat-anchor').scrollIntoView({ behavior: "smooth" });
        }

        function showLoading() {
            const container = document.getElementById('chat-history');
            const msgDiv = document.createElement('div');
            msgDiv.id = 'loading-bubble';
            msgDiv.className = "flex gap-6 w-full items-start py-6";
            msgDiv.innerHTML = `
                <div class="w-8 h-8 rounded-lg bg-indigo-100 flex items-center justify-center shrink-0 border border-indigo-200">
                    <i class="ph-bold ph-spinner animate-spin text-indigo-600 text-sm"></i>
                </div>
                <div class="flex-1 pt-1.5">
                    <p class="text-sm font-bold text-slate-400 animate-pulse uppercase">${i18n[currentLang].loading}</p>
                </div>
            `;
            container.appendChild(msgDiv);
            document.getElementById('chat-anchor').scrollIntoView({ behavior: "smooth" });
            document.getElementById('send-btn').disabled = true;
        }

        function clearChat() {
            document.getElementById('chat-history').innerHTML = `
                <div class="flex flex-col items-center justify-center text-center py-10 opacity-80" id="welcome-block">
                    <div class="w-16 h-16 bg-indigo-50 text-indigo-500 rounded-2xl flex items-center justify-center text-3xl mb-4 border border-indigo-100"><i class="ph-fill ph-magnifying-glass"></i></div>
                    <h2 class="font-serif-title text-2xl font-bold text-slate-800 mb-2">Ask an evidence-based question</h2>
                    <p class="text-sm text-slate-500 max-w-md mx-auto mb-6">Ask me anything about your dataset.</p>
                </div>
            `;
            chatHistory = [];
            document.getElementById('evidence-list').innerHTML = `<div class="text-center py-10 opacity-60"><p class="text-xs font-medium text-slate-500">Ask a question to see data.</p></div>`;
        }

        // --- Gemini API Call ---
        async function sendMessage() {
    const inputEl = document.getElementById('chat-input');
    const message = inputEl.value.trim();
    const apiKey = document.getElementById('api-key').value.trim();
    const model = document.getElementById('model-select').value;

    if (!message) return;
    if (!apiKey) { alert(i18n[currentLang].errorNoKey); return; }
    if (innovationData.length === 0) { alert(i18n[currentLang].errorDb); return; }

    localStorage.setItem('gii_gemini_key', apiKey);

    inputEl.value = '';
    inputEl.style.height = 'auto'; 
    appendMessage('user', message);
    showLoading();

    // 1. Cari data internal lokal
    const relevantData = retrieveRelevantData(message);
    updateEvidencePanel(relevantData);

    const filteredContext = JSON.stringify(relevantData.map(item => ({
        T: item.title, 
        C: item.location?.country, 
        Cat: Array.isArray(item.category) ? item.category.join(",") : (item.category || ""), 
        S: item.summary
    })));

    // 2. Prompt 
    const systemPrompt = `You are Edu-Scite, an elite academic research assistant. 
    Respond in ${currentLang === 'id' ? 'Indonesian' : 'English'}.
    
    CRITICAL INSTRUCTIONS: 
    1. Answer by synthesizing the "INTERNAL SEARCH RESULTS" below.
    2. YOU MUST USE YOUR GOOGLE SEARCH TOOL to find additional scientific literature (Springer, Nature, PubMed, Google Scholar, etc.) to heavily support or contrast the internal data.
    3. Every claim MUST be cited using THIS EXACT FORMAT: [[Type: Title]]
    
    TYPES OF CITATIONS:
    - [[Supporting: Title]] -> For internal dataset claims that support the argument.
    - [[Contrasting: Title]] -> For internal dataset claims that offer alternatives.
    - [[Mentioning: Title]] -> For internal dataset neutral mentions.
    - [[External: Journal/Author - Title]] -> For claims backed by external web/journal publications you just found via Google Search.

    INTERNAL SEARCH RESULTS:
    ---
    ${filteredContext}
    ---`;

    const contents = chatHistory.map(msg => ({
        role: msg.role === 'user' ? 'user' : 'model',
        parts: [{ text: msg.text }]
    }));
    
    contents.push({ role: 'user', parts: [{ text: message }] });

    try {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
        
        // 3. Payload dengan Tools (Menggunakan let agar bisa diubah saat Auto-Fallback)
        let payload = {
            contents: contents,
            systemInstruction: { parts: [{ text: systemPrompt }] },
            tools: [{ google_search: {} }], // <-- Sintaks aman untuk REST API
            generationConfig: { temperature: 0.3, maxOutputTokens: 3000 }
        };

        let response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        // =========================================================
        // 🚀 SMART AUTO-FALLBACK JIKA SERVER GOOGLE DOWN/SIBUK
        // =========================================================
        if (response.status === 503 || response.status === 500) {
            console.warn("⚠️ Server Google Search sibuk (503). Mengalihkan ke mode Lokal...");
            
            // Munculkan notifikasi error yang rapi di panel kanan
            document.getElementById('external-evidence-section').classList.remove('hidden');
            document.getElementById('external-evidence-list').innerHTML = `
                <div class="bg-rose-50 p-3 rounded-lg border border-rose-200 shadow-sm text-rose-600 text-xs font-medium">
                    <i class="ph-bold ph-warning-circle mb-1 text-base"></i><br>
                    Google Web Search is currently overloaded (503). Generating response based on local data only.
                </div>
            `;
            
            // Hapus tool web search agar API tidak keberatan, dan panggil API ulang
            delete payload.tools; 
            response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        }
        // =========================================================

        if (!response.ok) throw new Error(`API Error: ${response.status}`);

        const data = await response.json();
        const aiResponseText = data.candidates[0]?.content?.parts[0]?.text;
        
        // 4. MENGAMBIL DATA WEB DARI GEMINI (Grounding Metadata)
        const grounding = data.candidates[0]?.groundingMetadata;
        if (grounding && grounding.groundingChunks) {
            const extList = document.getElementById('external-evidence-list');
            extList.innerHTML = '';
            
            grounding.groundingChunks.forEach((chunk, idx) => {
                if (chunk.web) {
                    document.getElementById('external-evidence-section').classList.remove('hidden');
                    extList.innerHTML += `
                        <a href="${chunk.web.uri}" target="_blank" class="block bg-purple-50 p-3 rounded-lg border border-purple-200 shadow-sm hover:border-purple-400 hover:-translate-y-0.5 transition-all cursor-pointer">
                            <div class="text-[10px] font-bold text-purple-600 uppercase tracking-wider mb-1 flex items-center gap-1"><i class="ph-bold ph-link"></i> Web Source #${idx + 1}</div>
                            <h3 class="text-[12px] font-bold text-slate-800 leading-tight mb-1 line-clamp-2">${chunk.web.title}</h3>
                            <div class="text-[9px] text-purple-600 font-medium truncate">${chunk.web.uri}</div>
                        </a>
                    `;
                }
            });
        }

        document.getElementById('loading-bubble').remove();
        document.getElementById('send-btn').disabled = false;

        if (aiResponseText) {
            appendMessage('ai', aiResponseText);
            chatHistory.push({ role: 'user', text: message });
            chatHistory.push({ role: 'ai', text: aiResponseText });
        }

    } catch (error) {
        document.getElementById('loading-bubble').remove();
        document.getElementById('send-btn').disabled = false;
        appendMessage('ai', i18n[currentLang].errorApi);
        console.error(error);
    }
}

    </script>
</body>
</html>
