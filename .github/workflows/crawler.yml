name: Innovation Radar Auto-Crawler

on:
  schedule:
    # Menjalankan trigger setiap hari jam 00:00 UTC
    # (Logika Python yang akan memutuskan apakah ini waktunya crawl atau skip)
    - cron: "0 0 * * *"
  workflow_dispatch: 
    inputs:
      run_type:
        description: 'Pilih tipe eksekusi yang ingin dijalankan:'
        required: true
        default: 'auto'
        type: choice
        options:
          - 'auto'          # Mengikuti jadwal history
          - 'force_data'    # Hanya mencari data.json baru secara paksa
          - 'force_resume'  # Hanya men-generate resume.json baru secara paksa
          - 'force_both'    # Mencari data sekaligus men-generate resume

      # 👇 PERBAIKAN: Spasi dimajukan agar sejajar dengan run_type (masuk ke dalam inputs)
      fetch_limit:
        description: 'Jumlah data yang dicari (Berlaku untuk force data):'
        required: true
        default: '3'
        type: choice
        options:
          - '3'   # Normal
          - '10'  # Medium
          - '20'  # Super Banyak sekaligus!

# 👇 TAMBAHAN: Mencegah tabrakan (race condition)
# Jika proses sedang jalan, dan Anda tekan Run manual, proses akan masuk antrean (tidak jalan berbarengan)
concurrency:
  group: radar-crawler
  cancel-in-progress: false

jobs:
  run-scraper-and-ai:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Intelligent Scheduler & AI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: "gemini-2.5-flash" 
          RUN_TYPE: ${{ github.event.inputs.run_type || 'auto' }}
          DATA_INTERVAL_DAYS: 2
          RESUME_INTERVAL_DAYS: 90
          # 👇 MENERIMA INPUT DARI DROPDOWN (Jika jalan otomatis/cron, default ke 3)
          MAX_ITEMS_PER_RUN: ${{ github.event.inputs.fetch_limit || '3' }}
        run: python scraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Masukkan semua perubahan yang baru saja dilakukan oleh Python
          git add data.json resume.json history.json report.md || true
          
          # 2. Cek apakah ada data baru?
          if git diff --staged --quiet; then
            echo "No new data to commit."
          else
            # 3. SIMPAN/COMMIT dulu secara lokal agar Git tidak panik
            git commit -m "🤖 Auto-update: Synchronized Radar Data & Resumes [skip ci]"
            
            # 4. Baru sekarang AMAN untuk menarik (pull) perubahan dari server Github
            git pull --rebase origin main
            
            # 5. Terakhir, dorong (push) ke repositori Anda
            git push origin main
          fi

      - name: Keep repo alive
        run: |
          echo "Last run: $(date)" > .heartbeat
          git add .heartbeat
          git commit -m "💓 keep alive" || echo "No changes"
          git push || echo "Nothing to push"
